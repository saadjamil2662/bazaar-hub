version: '3.8'

services:
  database:
    image: postgres:15-alpine
    container_name: bazaar_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: bazaar_hub
    volumes:
      # Attach a volume to the database container for persistent data
      - db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:alpine
    container_name: bazaar_redis
    ports:
      - "6379:6379"

  backend:
    image: saadjamil1/bazaar-hub-backend:latest
    container_name: bazaar_backend
    environment:
      - PORT=5000
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:mysecretpassword@database:5432/bazaar_hub
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=your_production_secret_key_here
      - FRONTEND_URL=http://localhost:80
    ports:
      - "5000:5000"
    depends_on:
      - database
      - redis

  frontend:
    image: saadjamil1/bazaar-hub-frontend:latest
    container_name: bazaar_frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  db-data:
